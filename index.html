    :root {
      --cream:   #f5efe6;
      --cream2:  #ede5d8;
      --red:     #c82518;
      --red2:    #a61e14;
      --brown:   #6b5744;
      --text:    #1c1410;
      --text2:   #7a6555;
      --white:   #ffffff;
      --green:   #2a7d4f;
      --danger:  #c82518;
      --border:  #e0d5c8;
      --shadow:  0 2px 12px rgba(100,60,30,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--cream); min-height: 100vh; color: var(--text); }
    #root { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--cream); }
    input, textarea, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* ── MODAL ── */
    .overlay { position: fixed; inset: 0; background: rgba(28,20,16,0.5); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; max-width: 430px; left: 50%; transform: translateX(-50%); backdrop-filter: blur(2px); }
    .sheet { background: var(--white); border-radius: 24px 24px 0 0; width: 100%; max-height: 93vh; overflow-y: auto; padding: 8px 20px 36px; }
    .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 20px; }

    /* ── CARDS ── */
    .card { background: var(--white); border-radius: 18px; padding: 16px; box-shadow: var(--shadow); border: 1px solid rgba(224,213,200,0.6); }

    /* ── INPUTS ── */
    .input { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 15px; outline: none; background: #faf7f3; transition: border-color 0.2s; color: var(--text); }
    .input:focus { border-color: var(--red); background: var(--white); }
    .label { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: block; letter-spacing: 0.7px; text-transform: uppercase; }

    /* ── BADGES ── */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }

    /* ── TAB BAR ── */
    .tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--white); border-top: 1px solid var(--border); padding: 8px 0 env(safe-area-inset-bottom, 10px); display: flex; overflow-x: auto; overflow-y: hidden; z-index: 100; box-shadow: 0 -4px 20px rgba(100,60,30,0.08); scrollbar-width: none; }
    .tabbar::-webkit-scrollbar { display: none; }
    .tab { flex: 0 0 72px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; transition: all 0.15s; }
    .tab:active { opacity: 0.65; transform: scale(0.95); }
    .tab-lbl { font-size: 9.5px; font-weight: 600; }

    /* ── BUTTONS ── */
    .btn-primary { background: var(--red); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; transition: background 0.15s; }
    .btn-primary:hover { background: var(--red2); }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-green { background: var(--green); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; }
    .chip { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; font-family: inherit; transition: all 0.15s; }
    .chip:active { transform: scale(0.95); }
    .scroll-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }

    /* ── LOGO FONT ── */
    .logo-fino { font-family: 'Dancing Script', cursive; font-size: 20px; color: var(--white); line-height: 1; }
    .logo-pala { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--white); letter-spacing: 1px; line-height: 1; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
    @keyframes pulse   { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
    @keyframes slideUp { from { transform:translateY(50px); opacity:0 } to { transform:translateY(0); opacity:1 } }
    .overlay { animation: fadeIn 0.2s ease; }
    .sheet   { animation: slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1); }
    @keyframes scaleIn { from { transform:scale(0.95); opacity:0 } to { transform:scale(1); opacity:1 } }
    .card { animation: scaleIn 0.25s ease; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--border); margin: 8px 0; }

    /* ── SECTION LABEL ── */
    .section-label { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 10px; }
  </style>
</head>

  const [fornecedores,  setFornecedores]  = useState(()=>db.get('fp_fornecedores', []));
  const [estoqueData,   setEstoqueData]   = useState(()=>db.get('fp_estoque', {}));
  const [estoqueHist,   setEstoqueHist]   = useState(()=>db.get('fp_estoque_hist', []));
  const [alertKey, setAlertKey] = useState('');
  const [newCardapioCount, setNewCardapioCount] = useState(0);
  const initDone = React.useRef(false);
  const importedCardapioIds = React.useRef(new Set());

  useEffect(()=>{ if(initDone.current) db.set('fp_trans',   trans);  }, [trans]);
  useEffect(()=>{ if(initDone.current) db.set('fp_orders',  orders); }, [orders]);
  useEffect(()=>{ if(initDone.current) db.set('fp_events',  events); }, [events]);
  useEffect(()=>{ if(initDone.current) db.set('fp_sheet_id', sheetId); }, [sheetId]);
  useEffect(()=>{ if(initDone.current) db.set('fp_products', products); }, [products]);
  useEffect(()=>{ if(initDone.current) db.set('fp_opening_bal', openBal); }, [openBal]);
  useEffect(()=>{ if(initDone.current) db.set('fp_contas',       contas);       }, [contas]);
  useEffect(()=>{ if(initDone.current) db.set('fp_cats_pagar',   catsPagar);    }, [catsPagar]);
  useEffect(()=>{ if(initDone.current) db.set('fp_fornecedores', fornecedores); }, [fornecedores]);
  useEffect(()=>{ if(initDone.current) db.set('fp_estoque',      estoqueData);  }, [estoqueData]);
  useEffect(()=>{ if(initDone.current) db.set('fp_estoque_hist', estoqueHist);  }, [estoqueHist]);

  const addTrans  = t => setTrans(p  => [{...t,  id:genId()}, ...p]);
  const addOrder  = o => {
    const nId = genId(); const ord = {...o, id:nId, createdAt:today()};
    setOrders(p => [ord, ...p]);
    setContas(p => [{id:genId(), tipo:'receber', descricao:`Pedido – ${o.client||'Cliente'}`,
      valor:o.total||0, vencimento:o.deliveryDate||today(), categoria:'Pedido',
      cliente:o.client||'', origemId:nId, origemTipo:'pedido',
      pago:false, criadoEm:today(), pagoEm:null}, ...p]);
  };
  const addEvent  = e => setEvents(p => [{...e,  id:genId(), createdAt:today()}, ...p]);
  const updOrder  = (id,d) => {
    setOrders(p => p.map(o => o.id===id?{...o,...d}:o));
    if (d.status==='delivered' && !d.paid) {
      setContas(p => p.map(c => c.origemId===id&&c.tipo==='receber'&&!c.pago ? {...c,vencimento:today()} : c));
    }
  };
  const updEvent  = (id,d) => setEvents(p => p.map(e => e.id===id?{...e,...d}:e));
  const delTrans  = id => setTrans(p => p.filter(t => t.id!==id));
  const addConta   = c => setContas(p => [{...c, id:genId(), criadoEm:today()}, ...p]);
  const pagarConta = id => setContas(p => p.map(c => c.id===id?{...c,pago:true,pagoEm:today()}:c));
  const delConta   = id => setContas(p => p.filter(c => c.id!==id));

  const open  = (m,d=null)=>{ setModal(m); setMData(d); };
  const close = ()=>{ setModal(null); setMData(null); };

  // Fornecedores
  const addFornecedor = f => setFornecedores(p=>[{...f,id:genId(),criadoEm:today()},...p]);
  const updFornecedor = (id,d) => setFornecedores(p=>p.map(f=>f.id===id?{...f,...d}:f));
  const delFornecedor = id => setFornecedores(p=>p.filter(f=>f.id!==id));

  // Estoque — ajuste manual ou automático
  const ajustarEstoque = (nome, delta, motivo, tipo) => {
    setEstoqueData(prev => {
      const atual = prev[nome] !== undefined ? prev[nome] : null;
      const novoVal = atual === null ? Math.max(0, delta) : Math.max(0, atual + delta);
      const next = {...prev, [nome]: novoVal};
      // Sincronizar com Firestore para o cardápio ler
      try { window.__fsdb.collection('fp_data').doc('fp_estoque_cardapio').set({data:next,ts:Date.now()}).catch(()=>{}); } catch(e){}
      return next;
    });
    setEstoqueHist(p=>[{id:genId(),nome,tipo,quantidade:Math.abs(delta),motivo,data:today()},...p].slice(0,500));
  };

  const debitarEstoquePedido = (itens) => {
    setEstoqueData(prev => {
      const next = {...prev};
      itens.forEach(item => {
        const nome = item.productName||item.nome||'';
        if (next[nome] !== undefined && next[nome] !== null) {
          next[nome] = Math.max(0, next[nome] - (item.qty||1));
        }
      });
      try { window.__fsdb.collection('fp_data').doc('fp_estoque_cardapio').set({data:next,ts:Date.now()}).catch(()=>{}); } catch(e){}
      return next;
    });
  };

  const paidOrder = o => {
    const pd = today();
    updOrder(o.id,{paid:true,status:'delivered',paidAt:pd});
    addTrans({date:pd,type:'entrada',category:'Venda Congelada',amount:o.total,description:`Pedido – ${o.client}`,paymentMethod:'Pix',ref:o.id});
    setContas(p => p.map(c => c.origemId===o.id&&c.tipo==='receber'?{...c,pago:true,pagoEm:pd}:c));
  };
  const paidEvent = e => {
    const pd = today();
    updEvent(e.id,{paid:true,status:'realizado',paidAt:pd});
    addTrans({date:pd,type:'entrada',category:e.type==='ao_vivo'?'Evento ao Vivo':'Evento Express',amount:e.proposedValue,description:`Evento – ${e.client}`,paymentMethod:'Pix',ref:e.id});
  };

  // ── SYNC GOOGLE SHEETS ───────────────────────────────────────────────
  // JSONP helper — bypasses CORS when app is opened as a local file
  const fetchGviz = (url) => new Promise((resolve, reject) => {
    const cb = '__gviz_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const to = setTimeout(() => {
      delete window[cb]; script.parentNode&&script.parentNode.removeChild(script);
      reject(new Error('Timeout: planilha demorou demais para responder.'));
    }, 12000);
    window[cb] = (data) => {
      clearTimeout(to); delete window[cb];
      script.parentNode&&script.parentNode.removeChild(script);
      resolve(data);
    };
    const script = document.createElement('script');
    script.onerror = () => {
      clearTimeout(to); delete window[cb];
      script.parentNode&&script.parentNode.removeChild(script);
      reject(new Error('Planilha não encontrada ou não está pública. Compartilhe como "Qualquer pessoa com o link pode visualizar".'));
    };
    script.src = url + '&tqx=responseHandler:' + cb;
    document.head.appendChild(script);
  });

  const syncFromSheets = async (overrideId) => {
    const rawId = (typeof overrideId === 'string' && overrideId) ? overrideId : sheetId;
    // Accept full URL or just the ID
    const m = typeof rawId === 'string' && rawId.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    const id = m ? m[1] : rawId;
    if (!id || syncing) return;
    setSyncing(true); setSyncMsg(null);
    let no = 0, ne = 0;
    try {
      const existO = new Set(orders.filter(o=>o.sheetId).map(o=>o.sheetId));
      const existE = new Set(events.filter(e=>e.sheetId).map(e=>e.sheetId));

      // ── Pedidos ──
      const d1 = await fetchGviz(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?sheet=Pedidos`);
      if (!d1?.table) throw new Error('Aba "Pedidos" não encontrada. Verifique o nome exato da aba na planilha.');
      const newOrds = [];
      if (d1.table.rows) {
        d1.table.rows.forEach(row => {
          const c = row.c||[]; const g = i => { const v=c[i]?.v; return v===null||v===undefined?'':String(v); };
          const sid = g(0); if (!sid || existO.has(sid)) return;
          const rawItems = g(4); const total = parseFloat(g(5))||0;
          if (!g(2)) return;
          newOrds.push({ id:genId(), sheetId:sid, source:'whatsapp',
            client:g(2), whatsapp:g(3),
            items:[{ productId:'wh', productName:rawItems||'(ver obs.)', qty:1, unitPrice:total, cat:'grande' }],
            total, deliveryDate:g(6), deliveryAddress:g(7), notes:g(8),
            status:'pending', paid:false, createdAt:today() });
          no++;
        });
      }
      if (newOrds.length > 0) {
        setOrders(p => [...newOrds, ...p]);
        const newContasR = newOrds.map(o => ({id:genId(), tipo:'receber',
          descricao:`Pedido – ${o.client||'Cliente'}`, valor:o.total||0,
          vencimento:o.deliveryDate||o.createdAt, categoria:'Pedido',
          cliente:o.client||'', origemId:o.id, origemTipo:'pedido',
          pago:false, criadoEm:today(), pagoEm:null}));
        setContas(p => [...newContasR, ...p]);
      }

      // ── Eventos ──
      const d2 = await fetchGviz(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?sheet=Eventos`);
      if (!d2?.table) throw new Error('Aba "Eventos" não encontrada. Verifique o nome exato da aba na planilha.');
      const newEvts = [];
      if (d2.table.rows) {
        d2.table.rows.forEach(row => {
          const c = row.c||[]; const g = i => { const v=c[i]?.v; return v===null||v===undefined?'':String(v); };
          const sid = g(0); if (!sid || existE.has(sid)) return;
          if (!g(2)) return;
          const t = g(4).toLowerCase().includes('express') ? 'express' : 'ao_vivo';
          newEvts.push({ id:genId(), sheetId:sid, source:'whatsapp',
            client:g(2), whatsapp:g(3), type:t,
            eventDate:g(5), location:g(6), guests:parseInt(g(7))||0,
            proposedValue:parseFloat(g(8))||0, notes:g(9),
            status:'orcamento', paid:false, createdAt:today() });
          ne++;
        });
      }
      if (newEvts.length > 0) setEvents(p => [...newEvts, ...p]);

      const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setLastSync(now); db.set('fp_last_sync',now);
      setSyncMsg({ ok:true, no, ne });
    } catch(err) {
      setSyncMsg({ ok:false, err: err.message || 'Erro desconhecido ao sincronizar.' });
    } finally { setSyncing(false); }
  };

  // ── CLOUD SYNC: load from Firestore on startup ──
  useEffect(() => {
    setCloudStatus('syncing');
    const KS = {
      'fp_trans': setTrans, 'fp_orders': setOrders, 'fp_events': setEvents,
      'fp_products': setProducts, 'fp_contas': setContas,
    };
    const CS = {
      'fp_sheet_id': v => setSheetId(typeof v==='string'?v:''),
      'fp_opening_bal': v => setOpenBal(parseFloat(v)||0),
    };
    Promise.all(Object.keys({...KS,...CS}).map(k =>
      window.__fsdb.collection('fp_data').doc(k).get()
        .then(d => ({k, v: d.exists ? d.data()?.data : undefined}))
        .catch(() => ({k, v:undefined}))
    )).then(res => {
      initDone.current = true;
      res.forEach(({k,v}) => {
        if (v===undefined) return;
        try { localStorage.setItem(k,JSON.stringify(v)); } catch {}
        if (KS[k]) KS[k](Array.isArray(v)?v:[]);
        if (CS[k]) CS[k](v);
      });
      setCloudStatus('ok');
      setTimeout(()=>setCloudStatus('idle'), 3000);
    }).catch(()=>{ initDone.current = true; setCloudStatus('error'); });
  }, []);

  // Cardápio orders listener — imports new orders into Pedidos tab
  useEffect(() => {
    const parseDate = s => {
      if (!s) return today();
      const p = s.split('/');
      return p.length===3 ? p[2]+'-'+p[1]+'-'+p[0] : today();
    };
    const playBeep = () => {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        [0,150,300].forEach(d=>setTimeout(()=>{
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.frequency.value=880;g.gain.setValueAtTime(0.25,ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
          o.start();o.stop(ac.currentTime+0.3);
        },d));
      } catch(e){}
    };
    let unsub;
    try {
      unsub = window.__fsdb.collection('fp_pedidos')
        .where('status','==','novo')
        .onSnapshot(snap => {
          let added = 0;
          snap.docChanges().forEach(change => {
            if (change.type !== 'added') return;
            const docId = change.doc.id;
            if (importedCardapioIds.current.has(docId)) return;
            importedCardapioIds.current.add(docId);
            const d = change.doc.data();
            const orderItems = (d.itens||[]).map(i=>({
              productId: (i.nome||'').replace(/\s+/g,'_').toLowerCase(),
              productName: i.nome||'',
              qty: i.qty||1,
              unitPrice: i.preco||0,
              cat: 'grande'
            }));
            const newOrder = {
              id: genId(),
              cardapioId: docId,
              client: d.cliente||'Cliente',
              whatsapp: d.whatsapp||'',
              items: orderItems,
              total: d.total||0,
              deliveryDate: parseDate(d.data),
              deliveryAddress: d.local==='delivery'?(d.endereco||''):'Retirada no local',
              notes: (d.obs?'Obs: '+d.obs+' | ':'')+('Horário: '+(d.horario||''))+(d.pagamento?' | Pagto: '+d.pagamento:''),
              status: 'pending',
              paid: false,
              createdAt: today(),
              fromCardapio: true
            };
            setOrders(p => [newOrder,...p]);
            debitarEstoquePedido(orderItems);
            window.__fsdb.collection('fp_pedidos').doc(docId).update({status:'importado'}).catch(()=>{});
            added++;
          });
          if (added > 0) { setNewCardapioCount(c=>c+added); playBeep(); }
        }, ()=>{});
    } catch(e){}
    return ()=>{ try{unsub&&unsub();}catch(e){} };
  }, []);

  // Auto-sync on startup if sheet ID already configured
  useEffect(() => { if (sheetId) syncFromSheets(sheetId); }, []);

  // Auto-sync polling every 3 minutes
  useEffect(() => {
    if (!sheetId) return;
    const id = setInterval(() => syncFromSheets(sheetId), 3 * 60 * 1000);
    return () => clearInterval(id);
  }, [sheetId]);

  const ctx = { trans, orders, events, products, setProducts, addTrans, addOrder, addEvent, updOrder, updEvent, delTrans, paidOrder, paidEvent, contas, addConta, pagarConta, delConta, open, close, setTab, sheetId, setSheetId, syncing, syncFromSheets, lastSync, syncMsg, showCfg, setShowCfg, openBal, setOpenBal, showProds, setShowProds, cloudStatus, newCardapioCount, catsPagar, setCatsPagar, fornecedores, addFornecedor, updFornecedor, delFornecedor, estoqueData, estoqueHist, ajustarEstoque };

  const TABS = [
    {id:'dashboard',   lbl:'Início',   icon:I.home},
    {id:'finance',     lbl:'Finanças', icon:I.cash},
    {id:'orders',      lbl:'Pedidos',  icon:I.bag},
    {id:'events',      lbl:'Eventos',  icon:I.cal},
    {id:'contas',      lbl:'Contas',   icon:I.bill},
    {id:'estoque',     lbl:'Estoque',  icon:I.box},
    {id:'profits',     lbl:'Lucros',   icon:I.coin},
    {id:'whatsapp',    lbl:'WhatsApp', icon:I.wa},
  ];

  const headerAction = () => {
    if (tab==='dashboard'||tab==='finance') return <button onClick={()=>open('add_trans',{type:'entrada'})} style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 13px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>{I.plus('white',15)} Lançar</button>;
    if (tab==='orders')  return <button onClick={()=>open('add_order')} style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 13px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>{I.plus('white',15)} Pedido</button>;
    if (tab==='events')  return <button onClick={()=>open('add_event')} style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 13px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>{I.plus('white',15)} Evento</button>;
    if (tab==='contas')  return <button onClick={()=>open('add_conta')} style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 13px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>{I.plus('white',15)} Conta</button>;
    return null;
  };

  return (
    <div style={{paddingBottom:80, minHeight:'100vh'}}>

      {/* ── HEADER ── */}
      <div style={{background:`linear-gradient(135deg, ${C.red} 0%, ${C.red2} 100%)`, padding:'16px 18px 14px', position:'sticky', top:0, zIndex:50, boxShadow:'0 4px 20px rgba(200,37,24,0.25)'}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <Logo size="header"/>
          <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
            {headerAction()}
            {cloudStatus!=='idle' && (
              <div style={{display:'flex',alignItems:'center',gap:4,padding:'6px 10px',borderRadius:10,background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.25)'}}>
                {cloudStatus==='syncing' && <><span style={{width:8,height:8,borderRadius:'50%',background:'#fbbf24',display:'inline-block',animation:'pulse 1s infinite'}}/>
                  <span style={{fontSize:11,color:'rgba(255,255,255,0.9)',fontWeight:700}}>Sync...</span></>}
                {cloudStatus==='ok' && <><span style={{fontSize:13}}>☁️</span>
                  <span style={{fontSize:11,color:'#86efac',fontWeight:700}}>Salvo</span></>}
                {cloudStatus==='error' && <><span style={{fontSize:13}}>⚠️</span>
                  <span style={{fontSize:11,color:'#fca5a5',fontWeight:700}}>Offline</span></>}
              </div>
            )}
            <button onClick={()=>setShowCfg(true)} title="Configurações" style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 10px',cursor:'pointer',display:'flex',alignItems:'center',fontFamily:'inherit',position:'relative'}}>
              {I.gear('white',17)}
              {sheetId&&syncing&&<span style={{position:'absolute',top:-3,right:-3,width:8,height:8,borderRadius:'50%',background:'#f59e0b'}}/>}
            </button>
          </div>
        </div>
      </div>

      {/* ── VENCIDOS BANNER ── */}
      <VencidosBanner ctx={ctx} alertKey={alertKey} setAlertKey={setAlertKey} setTab={setTab}/>

      {/* ── CONTENT ── */}
      <div style={{padding:'16px 14px'}}>
        {tab==='dashboard'   && <Dashboard   ctx={ctx}/>}
        {tab==='finance'     && <Finance     ctx={ctx}/>}
        {tab==='orders'      && <Orders      ctx={ctx}/>}
        {tab==='events'      && <Events      ctx={ctx}/>}
        {tab==='profits'     && <Lucros      ctx={ctx}/>}
        {tab==='contas'      && <Contas      ctx={ctx}/>}
        {tab==='estoque'     && <Estoque     ctx={ctx}/>}
        {tab==='whatsapp'    && <WhatsApp    ctx={ctx}/>}
      </div>

      {/* ── TAB BAR ── */}
      <div className="tabbar">
        {TABS.map(t=>{
          const isContas     = t.id==='contas';
          const isOrders     = t.id==='orders';
          const cVenc        = isContas  ? ctx.contas.filter(c=>!c.pago&&c.vencimento&&c.vencimento<today()).length : 0;
          const ordersBadge  = isOrders  ? ctx.newCardapioCount : 0;
          const badgeVal     = isContas  ? cVenc : ordersBadge;
          return (
            <div key={t.id} className="tab" onClick={()=>{ setTab(t.id); if(t.id==='orders') setNewCardapioCount(0); }} style={{position:'relative'}}>
              {t.icon(tab===t.id ? C.red : '#bbb', 22)}
              {badgeVal>0 && (
                <span style={{position:'absolute',top:2,right:14,background:'#b91c1c',color:'white',borderRadius:'50%',width:16,height:16,fontSize:9,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid var(--cream)'}}>
                  {badgeVal>9?'9+':badgeVal}
                </span>
              )}
              <span className="tab-lbl" style={{color:tab===t.id?C.red:'#bbb'}}>{t.lbl}</span>
            </div>
          );
        })}
      </div>

      {modal==='add_trans'  && <TransModal   ctx={ctx} initType={mData?.type}/>}
      {modal==='add_order'  && <OrderModal   ctx={ctx}/>}
      {modal==='add_event'  && <EventModal   ctx={ctx}/>}
      {modal==='add_conta'  && <ContaModal   ctx={ctx} initTipo={mData?.tipo||'receber'}/>}
      {modal==='view_order' && <OrderDetail  ctx={ctx} order={mData}/>}
      {modal==='view_event' && <EventDetail  ctx={ctx} event={mData}/>}
      {showCfg              && <SettingsModal  ctx={ctx}/>}
      {showProds            && <ProductsModal  ctx={ctx}/>}
    </div>
  );
}


// ── VENCIDOS BANNER ──────────────────────────────────────────────────────────
function VencidosBanner({ ctx, alertKey, setAlertKey, setTab }) {
  const tod = today();
  const vencR = ctx.contas.filter(c => c.tipo==='receber' && !c.pago && c.vencimento && c.vencimento < tod);
  const vencP = ctx.contas.filter(c => c.tipo==='pagar'   && !c.pago && c.vencimento && c.vencimento < tod);
  const total = vencR.length + vencP.length;
  if (total === 0) return null;

  const todKey = 'dismissed_' + tod;
  if (alertKey === todKey) return null;

  const totR = vencR.reduce((s,c)=>s+c.valor, 0);
  const totP = vencP.reduce((s,c)=>s+c.valor, 0);

  const buildWaMsg = () => {
    let msg = `🔔 *Fino Palastro – Contas Vencidas (${fmtDate(tod)})*\n\n`;
    if (vencR.length > 0) {
      msg += `📥 *A RECEBER (${vencR.length}):*\n`;
      vencR.forEach(c => { msg += `• ${c.descricao}${c.cliente?' – '+c.cliente:''}: ${fmtBRL(c.valor)} (venc. ${fmtDate(c.vencimento)})\n`; });
      msg += `*Total: ${fmtBRL(totR)}*\n\n`;
    }
    if (vencP.length > 0) {
      msg += `📤 *A PAGAR (${vencP.length}):*\n`;
      vencP.forEach(c => { msg += `• ${c.descricao}${c.cliente?' – '+c.cliente:''}: ${fmtBRL(c.valor)} (venc. ${fmtDate(c.vencimento)})\n`; });
      msg += `*Total: ${fmtBRL(totP)}*\n`;
    }
    return msg;
  };

  const openWA = () => {
    const msg = encodeURIComponent(buildWaMsg());
    window.open(`https://wa.me/5548991307102?text=${msg}`, '_blank');
  };

  return (

// ── DASHBOARD ──────────────────────────────────────────────────────────
function Dashboard({ ctx }) {
  const tod   = today();
  const dayT  = ctx.trans.filter(t=>t.date===tod);
  const dayIn = dayT.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const dayOut= dayT.filter(t=>t.type==='saida')  .reduce((s,t)=>s+t.amount,0);
  const allIn = ctx.trans.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const allOut= ctx.trans.filter(t=>t.type==='saida'  ).reduce((s,t)=>s+t.amount,0);

  const wkAgo  = (()=>{ const d=new Date(); d.setDate(d.getDate()-6); return d.toISOString().split('T')[0]; })();
  const wkT    = ctx.trans.filter(t=>t.date>=wkAgo);
  const wkIn   = wkT.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const wkOut  = wkT.filter(t=>t.type==='saida')  .reduce((s,t)=>s+t.amount,0);

  const mo1   = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-01`;
  const moT   = ctx.trans.filter(t=>t.date>=mo1);
  const moIn  = moT.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const moOut = moT.filter(t=>t.type==='saida')  .reduce((s,t)=>s+t.amount,0);

  const pendOrders  = ctx.orders.filter(o=>['pending','confirmed'].includes(o.status));
  const upcomEvents = ctx.events.filter(e=>['orcamento','confirmado'].includes(e.status)).sort((a,b)=>a.eventDate>b.eventDate?1:-1);

  const Stat = ({label,val,color})=>(
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:10,color:'rgba(255,255,255,0.65)',fontWeight:700,letterSpacing:'0.5px',marginBottom:2}}>{label}</div>
      <div style={{fontSize:17,fontWeight:800,color:color||'white'}}>{fmtBRL(val)}</div>
    </div>
  );

  return (
    <div>
      {/* Balance Hero */}
      <div style={{background:`linear-gradient(140deg,${C.red},${C.red2})`, borderRadius:22, padding:'22px 20px 20px', marginBottom:14, boxShadow:'0 8px 28px rgba(200,37,24,0.28)', position:'relative', overflow:'hidden'}}>
        {/* decorative circles */}
        <div style={{position:'absolute',top:-30,right:-30,width:140,height:140,borderRadius:'50%',background:'rgba(255,255,255,0.07)'}}/>
        <div style={{position:'absolute',bottom:-40,left:-20,width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,0.05)'}}/>
        <div style={{position:'relative'}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.65)',fontWeight:700,letterSpacing:'0.8px',marginBottom:4}}>SALDO DE HOJE</div>
          <div style={{fontSize:42,fontWeight:900,color:'white',letterSpacing:'-2px',lineHeight:1.1,marginBottom:18}}>{fmtBRL(dayIn-dayOut)}</div>
          <div style={{height:1,background:'rgba(255,255,255,0.2)',marginBottom:16}}/>
          <div style={{display:'flex',justifyContent:'space-around'}}>
            <Stat label="ENTRADAS HOJE" val={dayIn}/>
            <div style={{width:1,background:'rgba(255,255,255,0.2)'}}/>
            <Stat label="SAÍDAS HOJE"   val={dayOut}/>
          </div>
          {(ctx.openBal>0||allIn>0)&&<>
            <div style={{height:1,background:'rgba(255,255,255,0.15)',margin:'14px 0 10px'}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:10,color:'rgba(255,255,255,0.6)',fontWeight:700,letterSpacing:'0.5px'}}>SALDO TOTAL EM CAIXA</div>
              <div style={{fontSize:20,fontWeight:900,color:'white'}}>{fmtBRL(ctx.openBal+allIn-allOut)}</div>
            </div>
            {ctx.openBal>0&&<div style={{fontSize:10,color:'rgba(255,255,255,0.45)',marginTop:2}}>incl. abertura: {fmtBRL(ctx.openBal)}</div>}
          </>}
        </div>
      </div>

      {/* Week / Month */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
        {[['ESTA SEMANA',wkIn,wkOut],['ESTE MÊS',moIn,moOut]].map(([lbl,inc,out])=>(
          <div key={lbl} className="card" style={{padding:'14px 16px'}}>
            <div style={{fontSize:10,fontWeight:700,color:C.text2,letterSpacing:'0.6px',marginBottom:10}}>{lbl}</div>
            <div style={{fontSize:13,fontWeight:700,color:C.green,marginBottom:3}}>↑ {fmtBRL(inc)}</div>
            <div style={{fontSize:13,fontWeight:700,color:C.red,  marginBottom:8}}>↓ {fmtBRL(out)}</div>
            <div style={{height:1,background:C.border,marginBottom:8}}/>
            <div style={{fontSize:15,fontWeight:800,color:inc-out>=0?C.green:C.red}}>{fmtBRL(inc-out)}</div>
          </div>
        ))}
      </div>

      {/* Quick actions */}
      <div className="section-label">Ações Rápidas</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[
          {e:'💰',t:'Entrada',   s:'Registrar recebimento',bg:'#f0fdf4',tc:C.green, fn:()=>ctx.open('add_trans',{type:'entrada'})},
          {e:'💸',t:'Saída',     s:'Registrar despesa',    bg:'#fff5f5',tc:C.red,   fn:()=>ctx.open('add_trans',{type:'saida'})},
          {e:'🍕',t:'Pedido',    s:'Pizza congelada',      bg:'#fffbeb',tc:'#b45309',fn:()=>{ctx.setTab('orders');ctx.open('add_order');}},
          {e:'🎉',t:'Evento',    s:'Novo orçamento',       bg:'#eff6ff',tc:C.blue,  fn:()=>{ctx.setTab('events');ctx.open('add_event');}},
        ].map((b,i)=>(
          <button key={i} onClick={b.fn} style={{background:b.bg,border:`1px solid ${C.border}`,borderRadius:16,padding:'15px 14px',cursor:'pointer',textAlign:'left',fontFamily:'inherit'}}>
            <div style={{fontSize:26,marginBottom:8}}>{b.e}</div>
            <div style={{fontSize:14,fontWeight:800,color:b.tc}}>{b.t}</div>
            <div style={{fontSize:11,color:C.text2,marginTop:2,fontWeight:500}}>{b.s}</div>
          </button>
        ))}
      </div>

      {/* Pending orders */}
      {pendOrders.length>0 && <>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div className="section-label" style={{marginBottom:0}}>Pedidos Ativos</div>
          <span onClick={()=>ctx.setTab('orders')} style={{fontSize:12,color:C.red,fontWeight:700,cursor:'pointer'}}>Ver todos →</span>
        </div>
        {pendOrders.slice(0,3).map(o=>(
          <div key={o.id} className="card" onClick={()=>ctx.open('view_order',o)} style={{cursor:'pointer',marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{o.client}</div>
                <div style={{fontSize:12,color:C.text2,marginTop:2}}>{o.items.reduce((s,i)=>s+i.qty,0)} pizza(s) · {fmtDate(o.deliveryDate)}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:800,color:C.red,fontSize:15}}>{fmtBRL(o.total)}</div>
                <span className="badge" style={{background:S_CLR[o.status]?.bg,color:S_CLR[o.status]?.text,marginTop:4}}>{S_LBL[o.status]}</span>
              </div>
            </div>
          </div>
        ))}
      </>}

      {/* Upcoming events */}
      {upcomEvents.length>0 && <>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,marginTop:14}}>
          <div className="section-label" style={{marginBottom:0}}>Próximos Eventos</div>
          <span onClick={()=>ctx.setTab('events')} style={{fontSize:12,color:C.red,fontWeight:700,cursor:'pointer'}}>Ver todos →</span>
        </div>
        {upcomEvents.slice(0,3).map(e=>(
          <div key={e.id} className="card" onClick={()=>ctx.open('view_event',e)} style={{cursor:'pointer',marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{e.client}</div>
                <div style={{fontSize:12,color:C.text2,marginTop:2}}>{e.type==='ao_vivo'?'🔥 Ao Vivo':'⚡ Express'} · {fmtDate(e.eventDate)} · {e.guests} pax</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:800,color:C.blue,fontSize:15}}>{fmtBRL(e.proposedValue)}</div>
                <span className="badge" style={{background:S_CLR[e.status]?.bg||'#f0fdf4',color:S_CLR[e.status]?.text||C.green,marginTop:4}}>{S_LBL[e.status]||e.status}</span>
              </div>
            </div>
          </div>
        ))}
      </>}

      {ctx.trans.length===0&&ctx.orders.length===0&&ctx.events.length===0&&(
        <div style={{textAlign:'center',padding:'44px 20px'}}>
          <div style={{width:80,height:80,borderRadius:'50%',background:C.cream,border:`2px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 16px'}}>🍕</div>
          <div style={{fontWeight:800,fontSize:17,marginBottom:8}}>Bem-vindo ao Fino Palastro!</div>
          <div style={{fontSize:14,color:C.text2,lineHeight:1.6}}>Use as ações acima para começar a registrar entradas, saídas, pedidos e eventos.</div>
        </div>
      )}
    </div>
  );
}

// ── FINANCE ─────────────────────────────────────────────────────────────
function Finance({ ctx }) {
  const [period, setPeriod] = useState('month');
  const [typeF,  setTypeF]  = useState('all');
  const isReports = period === 'reports';
  const now = new Date();
  const cuts = {
    today: today(),
    week:  (()=>{ const d=new Date(); d.setDate(d.getDate()-6); return d.toISOString().split('T')[0]; })(),
    month: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`,
  };
  const list   = isReports ? [] : ctx.trans.filter(t=>t.date>=cuts[period]&&(typeF==='all'||t.type===typeF)).sort((a,b)=>b.date>a.date?1:-1);
  const totIn  = list.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const totOut = list.filter(t=>t.type==='saida'  ).reduce((s,t)=>s+t.amount,0);
  const bal    = totIn-totOut;
  const catMap = {};
  list.forEach(t=>{ if(!catMap[t.category])catMap[t.category]={in:0,out:0}; catMap[t.category][t.type==='entrada'?'in':'out']+=t.amount; });

  const chips = [['today','Hoje'],['week','7 dias'],['month','Mês'],['reports','📊 Relatórios']];

  return (
    <div>
      <div className="scroll-row" style={{marginBottom:14}}>
        {chips.map(([k,l])=>(
          <button key={k} className="chip" onClick={()=>setPeriod(k)}
            style={{background:period===k?C.red:'white',color:period===k?'white':C.text2,border:`1px solid ${period===k?C.red:C.border}`,fontSize:period==='reports'&&k==='reports'?12:13}}>
            {l}
          </button>
        ))}
      </div>

      {isReports ? <RelatoriosView ctx={ctx}/> : (
        <div>
          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            {[['ENTRADAS',totIn,C.green],['SAÍDAS',totOut,C.red],['SALDO',bal,bal>=0?C.green:C.red]].map(([l,v,c])=>(
              <div key={l} className="card" style={{padding:'12px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:C.text2,fontWeight:700,letterSpacing:'0.5px',marginBottom:4}}>{l}</div>
                <div style={{fontSize:13,fontWeight:900,color:c}}>{fmtBRL(v)}</div>
              </div>
            ))}
          </div>

          {/* Opening balance */}
          {ctx.openBal>0&&(
            <div style={{background:'#eff6ff',borderRadius:12,padding:'10px 14px',marginBottom:14,border:'1px solid #bfdbfe',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:12,color:'#1e40af',fontWeight:700}}>💰 Saldo de Abertura</div>
                <div style={{fontSize:10,color:'#3b82f6',marginTop:1}}>registrado antes de usar o app</div>
              </div>
              <span style={{fontSize:15,fontWeight:800,color:'#1d4ed8'}}>{fmtBRL(ctx.openBal)}</span>
            </div>
          )}

          {/* Category breakdown */}
          {Object.keys(catMap).length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div className="section-label">Por Categoria</div>
              {Object.entries(catMap).map(([cat,vals])=>(
                <div key={cat} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontSize:13,fontWeight:600}}>{cat}</div>
                  <div style={{textAlign:'right'}}>
                    {vals.in >0&&<div style={{fontSize:12,color:C.green,fontWeight:700}}>↑ {fmtBRL(vals.in)}</div>}
                    {vals.out>0&&<div style={{fontSize:12,color:C.red,  fontWeight:700}}>↓ {fmtBRL(vals.out)}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Type filter */}
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            {[['all','Todos'],['entrada','Entradas'],['saida','Saídas']].map(([k,l])=>(
              <button key={k} className="chip" onClick={()=>setTypeF(k)} style={{background:typeF===k?C.text:'white',color:typeF===k?'white':C.text2,border:`1px solid ${typeF===k?C.text:C.border}`}}>{l}</button>
            ))}
          </div>

          {list.length===0?(
            <div style={{textAlign:'center',padding:'40px 20px',color:C.text2}}>
              <div style={{fontSize:36,marginBottom:10}}>📋</div>
              <div style={{fontWeight:600}}>Nenhum lançamento neste período</div>
            </div>
          ):list.map(t=>(
            <div key={t.id} className="card" style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,padding:'13px 14px'}}>
              <div style={{width:42,height:42,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',background:t.type==='entrada'?'#f0fdf4':'#fff5f5',flexShrink:0,fontSize:18,fontWeight:800,color:t.type==='entrada'?C.green:C.red}}>
                {t.type==='entrada'?'↑':'↓'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.description||t.category}</div>
                <div style={{fontSize:11,color:C.text2,marginTop:2}}>{t.category} · {fmtDate(t.date)} · {t.paymentMethod}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:14,color:t.type==='entrada'?C.green:C.red}}>{t.type==='entrada'?'+':'-'}{fmtBRL(t.amount)}</div>
                <button onClick={()=>ctx.delTrans(t.id)} style={{background:'none',border:'none',cursor:'pointer',padding:'3px 0',marginTop:1}}>{I.trash('#d4c8bc',14)}</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{position:'fixed',bottom:90,right:16,display:'flex',flexDirection:'column',gap:10,zIndex:90}}>
        <button onClick={()=>ctx.open('add_trans',{type:'saida'})} style={{width:46,height:46,borderRadius:'50%',background:C.red,color:'white',border:'none',cursor:'pointer',fontSize:18,fontWeight:800,boxShadow:'0 4px 16px rgba(200,37,24,0.4)'}}>↓</button>
        <button onClick={()=>ctx.open('add_trans',{type:'entrada'})} style={{width:46,height:46,borderRadius:'50%',background:C.green,color:'white',border:'none',cursor:'pointer',fontSize:18,fontWeight:800,boxShadow:'0 4px 16px rgba(42,125,79,0.35)'}}>↑</button>
      </div>
    </div>
  );
}

// ── MODAL: TRANSACTION ────────────────────────────────────────────────────
function TransModal({ ctx, initType='entrada' }) {

  const [cat, setCat] =useState('');
  const [desc,setDesc]=useState('');
  const [pay, setPay] =useState('Pix');
  const [date,setDate]=useState(today());

  const save=()=>{ if(!amt||!cat)return; ctx.addTrans({type,amount:parseFloat(amt),category:cat,description:desc,paymentMethod:pay,date}); ctx.close(); };

  return (
    <div className="overlay" onClick={ctx.close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:19,fontWeight:800}}>Novo Lançamento</div>
          <button onClick={ctx.close} style={{background:'none',border:'none',cursor:'pointer'}}>{I.x('#bbb',24)}</button>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:20}}>

            <button key={k} onClick={()=>{setType(k);setCat('');}} style={{padding:14,borderRadius:14,border:`2px solid ${type===k?tc:C.border}`,background:type===k?bg:'white',fontWeight:800,cursor:'pointer',color:type===k?tc:'#bbb',fontSize:15,fontFamily:'inherit'}}>{l}</button>
          ))}
        </div>

        <div style={{textAlign:'center',padding:'18px 12px',background:'#faf5ee',borderRadius:16,marginBottom:20,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,color:C.text2,fontWeight:700,letterSpacing:'0.5px',marginBottom:4}}>VALOR (R$)</div>
          <input type="number" inputMode="decimal" placeholder="0,00" value={amt} onChange={e=>setAmt(e.target.value)}
            style={{fontSize:40,fontWeight:900,border:'none',outline:'none',background:'transparent',textAlign:'center',width:'100%',color:type==='entrada'?C.green:C.red,fontFamily:'inherit'}}/>

        <label className="label">Categoria</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:16}}>

            <button key={c} onClick={()=>setCat(c)} style={{padding:'8px 13px',borderRadius:20,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,background:cat===c?(type==='entrada'?C.green:C.red):'#f0ebe4',color:cat===c?'white':C.brown,fontFamily:'inherit'}}>{c}</button>
          ))}
        </div>

        <label className="label">Descrição (opcional)</label>
        <input className="input" style={{marginBottom:14}} placeholder="Ex: Venda para João" value={desc} onChange={e=>setDesc(e.target.value)}/>

        <label className="label">Forma de Pagamento</label>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:14}}>
          {PAYMENTS.map(m=>(
            <button key={m} onClick={()=>setPay(m)} style={{padding:'8px 13px',borderRadius:20,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,background:pay===m?C.text:'#f0ebe4',color:pay===m?'white':C.brown,fontFamily:'inherit'}}>{m}</button>

// ── MODAL: ORDER ──────────────────────────────────────────────────────────
function OrderModal({ ctx }) {
  const grandes = ctx.products.filter(p=>p.cat==='grande');
  const minis   = ctx.products.filter(p=>p.cat==='mini');
  const allProds= ctx.products;

  const [client,  setClient]  = useState('');
  const [wa,      setWa]      = useState('');
  const [items,   setItems]   = useState([{productId:allProds[0]?.id,productName:allProds[0]?.name,qty:1,unitPrice:allProds[0]?.price||0,cat:allProds[0]?.cat}]);
  const [delDate, setDelDate] = useState('');
  const [addr,    setAddr]    = useState('');
  const [notes,   setNotes]   = useState('');

  const total=items.reduce((s,i)=>s+(i.qty*i.unitPrice),0);

  const updItem=(idx,field,val)=>{
    const n=[...items];
    if(field==='productId'){const p=allProds.find(p=>p.id===val);n[idx]={...n[idx],productId:val,productName:p?.name,unitPrice:p?.price||0,cat:p?.cat};}
    else if(field==='qty')n[idx]={...n[idx],qty:Math.max(1,parseInt(val)||1)};
    setItems(n);
  };
  const addItem=(cat)=>{
    const src=cat==='grande'?grandes:minis;
    setItems([...items,{productId:src[0]?.id,productName:src[0]?.name,qty:1,unitPrice:src[0]?.price||0,cat}]);
  };
  const save=()=>{ if(!client)return; ctx.addOrder({client,whatsapp:wa,items,deliveryDate:delDate,deliveryAddress:addr,notes,total,status:'pending',paid:false}); ctx.close(); };

  return (
    <div className="overlay" onClick={ctx.close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:19,fontWeight:800}}>Novo Pedido</div>
          <button onClick={ctx.close} style={{background:'none',border:'none',cursor:'pointer'}}>{I.x('#bbb',24)}</button>
        </div>

        <label className="label">Nome do cliente *</label>
        <input className="input" style={{marginBottom:14}} placeholder="Nome completo" value={client} onChange={e=>setClient(e.target.value)}/>

        <label className="label">WhatsApp</label>
        <input className="input" type="tel" inputMode="tel" style={{marginBottom:16}} placeholder="(11) 99999-9999" value={wa} onChange={e=>setWa(e.target.value)}/>

        <label className="label">Pizzas</label>
        {items.map((item,idx)=>(
          <div key={idx} style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
            <div style={{flexShrink:0,width:58,textAlign:'center',fontSize:10,fontWeight:700,padding:'4px 6px',borderRadius:8,background:item.cat==='grande'?'#fff5f5':'#fffbeb',color:item.cat==='grande'?C.red:'#b45309',border:`1px solid ${item.cat==='grande'?'#fca5a5':'#fde68a'}`}}>
              {item.cat==='grande'?'GRANDE':'MINI'}
            </div>
            <select className="input" style={{flex:2,padding:'10px 12px'}} value={item.productId} onChange={e=>updItem(idx,'productId',e.target.value)}>
              <optgroup label="Pizzas Grandes (30cm)">
                {grandes.map(p=><option key={p.id} value={p.id}>{p.name} – {fmtBRL(p.price)}</option>)}
              </optgroup>
              <optgroup label="Mini Pizzas">
                {minis.map(p=><option key={p.id} value={p.id}>{p.name} – {fmtBRL(p.price)}</option>)}
              </optgroup>
            </select>
            <input className="input" type="number" min="1" style={{width:56,padding:'10px 8px',textAlign:'center'}} value={item.qty} onChange={e=>updItem(idx,'qty',e.target.value)}/>
            {items.length>1&&<button onClick={()=>setItems(items.filter((_,i)=>i!==idx))} style={{background:'none',border:'none',cursor:'pointer',flexShrink:0}}>{I.x(C.red,20)}</button>}
          </div>
        ))}

        <div style={{display:'flex',gap:8,marginBottom:16}}>
          <button onClick={()=>addItem('grande')} style={{background:'#fff5f5',border:`1px solid #fca5a5`,borderRadius:10,padding:'9px 14px',fontSize:12,fontWeight:700,cursor:'pointer',color:C.red,fontFamily:'inherit'}}>+ Grande</button>

// ── LUCROS VIEW ────────────────────────────────────────────────────────────
const PROFIT_RATES = {
  congelada: { sam:0.35,  gui:0.10  },
  ao_vivo:   { sam:0.35,  gui:0.20  },
  express:   { sam:0.265, gui:0.075 },
};

function getWeekRange(offset) {
  const now = new Date();
  const day = now.getDay(); // 0=Dom
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day===0?6:day-1) + offset*7);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate()+6);
  sunday.setHours(23,59,59,999);
  return { start:monday, end:sunday };
}

function fmtWeekLabel(start, end) {
  const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const s = `${start.getDate()} ${MONTHS[start.getMonth()]}`;
  const e = `${end.getDate()} ${MONTHS[end.getMonth()]}`;
  return `${s} – ${e}`;
}

function inWeek(dateStr, start, end) {
  if(!dateStr) return false;
  const d = new Date(dateStr+'T12:00:00');
  return d >= start && d <= end;
}

function Lucros({ ctx }) {
  const [weekOff, setWeekOff] = useState(0);
  const { start, end } = getWeekRange(weekOff);

  // Transações manuais da semana (só entradas das categorias que geram lucro)
  const manualCongelada = ctx.trans.filter(t => t.type==='entrada' && t.category==='Venda Congelada'  && inWeek(t.date, start, end));
  const manualLive      = ctx.trans.filter(t => t.type==='entrada' && t.category==='Evento ao Vivo'   && inWeek(t.date, start, end));
  const manualExpress   = ctx.trans.filter(t => t.type==='entrada' && t.category==='Evento Express'   && inWeek(t.date, start, end));

  // Pedidos pagos na semana (excluir os que já geraram transação automática para não duplicar)
  const paidOrders = ctx.orders.filter(o =>
    o.paid && inWeek(o.paidAt || o.createdAt, start, end)
  );
  // IDs de transações geradas automaticamente por paidOrder (ref = order id)
  const autoOrderRefs = new Set(paidOrders.map(o=>o.id));
  // Transações manuais de congelada que NÃO têm ref de pedido automático
  const manualCongeladaOnly = manualCongelada.filter(t => !autoOrderRefs.has(t.ref));

  const totalCongeladaOrders = paidOrders.reduce((s,o)=>s+o.total,0);
  const totalCongeladaManual = manualCongeladaOnly.reduce((s,t)=>s+t.amount,0);
  const totalCongelada = totalCongeladaOrders + totalCongeladaManual;

  // Conta sabores vendidos nos pedidos
  const flavorCount = {};
  paidOrders.forEach(o=>{ if(o.items) o.items.forEach(i=>{ flavorCount[i.productName]=(flavorCount[i.productName]||0)+i.qty; }); });
  const totalPizzas = Object.values(flavorCount).reduce((s,v)=>s+v,0);

  // Eventos ao vivo pagos na semana
  const paidLive = ctx.events.filter(e =>
    e.type==='ao_vivo' && e.paid && inWeek(e.paidAt || e.eventDate, start, end)
  );
  const autoLiveRefs = new Set(paidLive.map(e=>e.id));
  const manualLiveOnly = manualLive.filter(t => !autoLiveRefs.has(t.ref));
  const totalLive = paidLive.reduce((s,e)=>s+e.proposedValue,0) + manualLiveOnly.reduce((s,t)=>s+t.amount,0);

  // Eventos express pagos na semana
  const paidExpress = ctx.events.filter(e =>
    e.type==='express' && e.paid && inWeek(e.paidAt || e.eventDate, start, end)
  );
  const autoExpressRefs = new Set(paidExpress.map(e=>e.id));
  const manualExpressOnly = manualExpress.filter(t => !autoExpressRefs.has(t.ref));
  const totalExpress = paidExpress.reduce((s,e)=>s+e.proposedValue,0) + manualExpressOnly.reduce((s,t)=>s+t.amount,0);

  // Totais por sócio
  const samTotal = totalCongelada*PROFIT_RATES.congelada.sam + totalLive*PROFIT_RATES.ao_vivo.sam + totalExpress*PROFIT_RATES.express.sam;
  const guiTotal = totalCongelada*PROFIT_RATES.congelada.gui + totalLive*PROFIT_RATES.ao_vivo.gui + totalExpress*PROFIT_RATES.express.gui;

  const hasAny = paidOrders.length>0 || paidLive.length>0 || paidExpress.length>0
               || manualCongeladaOnly.length>0 || manualLiveOnly.length>0 || manualExpressOnly.length>0;

  const PctBadge = ({pct,name,color}) => (
    <div style={{background:color+'15',borderRadius:10,padding:'6px 10px',display:'flex',flexDirection:'column',alignItems:'center',flex:1}}>
      <div style={{fontSize:10,color:color,fontWeight:700,marginBottom:2}}>{name}</div>
      <div style={{fontSize:16,fontWeight:900,color}}>{(pct*100).toFixed(1)}%</div>
    </div>
  );

  const SectionHeader = ({emoji,title,count,total,cat}) => {
    const r = PROFIT_RATES[cat];
    return (
      <div style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <div style={{fontWeight:800,fontSize:15}}>{emoji} {title}</div>
          <div style={{fontWeight:900,fontSize:15,color:C.green}}>{fmtBRL(total)}</div>
        </div>
        <div style={{fontSize:12,color:C.text2,marginBottom:8}}>{count} {count===1?'registro':'registros'}</div>
        <div style={{display:'flex',gap:8}}>
          <PctBadge pct={r.sam} name="Samantha" color="#be185d"/>
          <PctBadge pct={r.gui} name="Guilherme" color={C.blue}/>
          <div style={{background:'#f0fdf4',borderRadius:10,padding:'6px 10px',display:'flex',flexDirection:'column',alignItems:'center',flex:1}}>
            <div style={{fontSize:10,color:C.green,fontWeight:700,marginBottom:2}}>Sam</div>
            <div style={{fontSize:14,fontWeight:900,color:C.green}}>{fmtBRL(total*r.sam)}</div>
          </div>
          <div style={{background:'#eff6ff',borderRadius:10,padding:'6px 10px',display:'flex',flexDirection:'column',alignItems:'center',flex:1}}>
            <div style={{fontSize:10,color:C.blue,fontWeight:700,marginBottom:2}}>Gui</div>
            <div style={{fontSize:14,fontWeight:900,color:C.blue}}>{fmtBRL(total*r.gui)}</div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* Cabeçalho semana */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <button onClick={()=>setWeekOff(w=>w-1)} style={{background:'#f0ebe4',border:'none',borderRadius:10,padding:'8px 14px',cursor:'pointer',fontWeight:800,fontSize:16,color:C.brown,fontFamily:'inherit'}}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontWeight:800,fontSize:14}}>
            {weekOff===0?'Esta Semana':weekOff===-1?'Semana Passada':`${Math.abs(weekOff)}sem atrás`}
          </div>
          <div style={{fontSize:11,color:C.text2,marginTop:2}}>{fmtWeekLabel(start,end)}</div>
        </div>
        <button onClick={()=>setWeekOff(w=>Math.min(0,w+1))} disabled={weekOff===0}
          style={{background:weekOff===0?'#f8f4f0':'#f0ebe4',border:'none',borderRadius:10,padding:'8px 14px',cursor:weekOff===0?'default':'pointer',fontWeight:800,fontSize:16,color:weekOff===0?'#ccc':C.brown,fontFamily:'inherit'}}>›</button>
      </div>

      {/* Card totais dos sócios */}
      {hasAny && (
        <div style={{background:`linear-gradient(135deg,${C.red},${C.red2})`,borderRadius:18,padding:'16px 18px',marginBottom:16,color:'white'}}>
          <div style={{fontSize:10,opacity:0.7,fontWeight:700,letterSpacing:'0.6px',marginBottom:10}}>RETIRADA DA SEMANA</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:14,padding:'12px 14px'}}>
              <div style={{fontSize:11,opacity:0.8,marginBottom:4}}>👩 Samantha</div>
              <div style={{fontSize:26,fontWeight:900,letterSpacing:'-0.5px'}}>{fmtBRL(samTotal)}</div>

// ── RELATÓRIOS VIEW ────────────────────────────────────────────────────────
function RelatoriosView({ ctx }) {
  const allIn  = ctx.trans.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const allOut = ctx.trans.filter(t=>t.type==='saida'  ).reduce((s,t)=>s+t.amount,0);
  const totalCaixa = ctx.openBal + allIn - allOut;

  const catRev = {};
  ctx.trans.forEach(t=>{ if(t.type==='entrada') catRev[t.category]=(catRev[t.category]||0)+t.amount; });
  const maxRev = Math.max(...Object.values(catRev), 1);

  const cancelledOrds = ctx.orders.filter(o=>o.status==='cancelled'||o.status==='cancelado');
  const activeOrds    = ctx.orders.filter(o=>o.status!=='cancelled'&&o.status!=='cancelado');
  const validOrds = activeOrds.filter(o=>o.total>0);
  const avgOrd = validOrds.length ? validOrds.reduce((s,o)=>s+o.total,0)/validOrds.length : 0;
  const delivOrd = activeOrds.filter(o=>o.status==='delivered').length;

  const validEvts = ctx.events.filter(e=>e.proposedValue>0);
  const avgEvt = validEvts.length ? validEvts.reduce((s,e)=>s+e.proposedValue,0)/validEvts.length : 0;
  const realEvts = ctx.events.filter(e=>e.status==='realizado').length;
  const liveEvts = ctx.events.filter(e=>e.type==='ao_vivo').length;
  const expEvts  = ctx.events.filter(e=>e.type==='express').length;

  const MONTHS_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const months = Array.from({length:3},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-2+i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return {
      lbl:`${MONTHS_PT[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`,
      inc:ctx.trans.filter(t=>t.date.startsWith(key)&&t.type==='entrada').reduce((s,t)=>s+t.amount,0),
      out:ctx.trans.filter(t=>t.date.startsWith(key)&&t.type==='saida').reduce((s,t)=>s+t.amount,0)
    };
  });
  const maxMo = Math.max(...months.map(m=>m.inc), 1);

  const prodCnt = {};
  activeOrds.forEach(o=>{ if(o.items) o.items.forEach(i=>{ prodCnt[i.productName]=(prodCnt[i.productName]||0)+i.qty; }); });
  const topProds = Object.entries(prodCnt).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const KPI = ({lbl,val,sub,c}) => (
    <div className="card" style={{padding:'13px 12px',textAlign:'center'}}>
      <div style={{fontSize:9,color:C.text2,fontWeight:700,letterSpacing:'0.5px',marginBottom:4,textTransform:'uppercase'}}>{lbl}</div>
      <div style={{fontSize:17,fontWeight:900,color:c||C.text}}>{val}</div>
      {sub&&<div style={{fontSize:10,color:C.text2,marginTop:2,lineHeight:1.4}}>{sub}</div>}
    </div>
  );

  if(ctx.trans.length===0&&ctx.orders.length===0&&ctx.events.length===0) return (
    <div style={{textAlign:'center',padding:'48px 20px'}}>
      <div style={{fontSize:52,marginBottom:12}}>📊</div>
      <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>Ainda sem dados</div>
      <div style={{fontSize:13,color:C.text2}}>Registre lancamentos, pedidos e eventos para ver os relatorios.</div>
    </div>
  );

  return (
    <div>
      <div style={{background:`linear-gradient(135deg,${C.red},${C.red2})`,borderRadius:18,padding:'16px 18px',marginBottom:14,color:'white'}}>
        <div style={{fontSize:10,opacity:0.7,fontWeight:700,letterSpacing:'0.6px',marginBottom:4}}>SALDO TOTAL EM CAIXA</div>
        <div style={{fontSize:32,fontWeight:900,letterSpacing:'-1px',marginBottom:6}}>{fmtBRL(totalCaixa)}</div>
        <div style={{fontSize:11,opacity:0.65,display:'flex',gap:12,flexWrap:'wrap'}}>
          {ctx.openBal>0&&<span>Abertura: {fmtBRL(ctx.openBal)}</span>}
          <span>entradas: {fmtBRL(allIn)}</span>
          <span>saidas: {fmtBRL(allOut)}</span>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
        <KPI lbl="Total Pedidos"  val={activeOrds.length} sub={`${delivOrd} entregues`}/>
        <KPI lbl="Total Eventos"  val={ctx.events.length} sub={`${realEvts} realizados`}/>
        <KPI lbl="Cancelados" val={cancelledOrds.length} c={C.red}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
        <KPI lbl="Ticket Medio Pedido" val={fmtBRL(avgOrd)} c={C.green}/>
        <KPI lbl="Ticket Medio Evento" val={fmtBRL(avgEvt)} c={C.blue}/>
      </div>

      {Object.keys(catRev).length>0&&(
        <div className="card" style={{marginBottom:14}}>
          <div className="section-label" style={{marginBottom:12}}>Receita por Categoria</div>
          {Object.entries(catRev).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>(
            <div key={cat} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:600}}>{cat}</span>
                <span style={{fontSize:12,fontWeight:800,color:C.green}}>{fmtBRL(val)}</span>
              </div>
              <div style={{height:7,background:'#f0ebe4',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',background:C.green,borderRadius:4,width:`${(val/maxRev)*100}%`}}/>
              </div>
            </div>
          ))}
        </div>
      )}

      {ctx.events.length>0&&(
        <div className="card" style={{marginBottom:14}}>
          <div className="section-label" style={{marginBottom:12}}>Tipos de Evento</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{textAlign:'center',background:'#fff5f5',borderRadius:12,padding:'14px 8px',border:`1px solid #fca5a5`}}>
              <div style={{fontSize:26,marginBottom:4}}>🔥</div>
              <div style={{fontWeight:900,fontSize:22,color:C.red}}>{liveEvts}</div>
              <div style={{fontSize:11,color:C.text2,marginTop:2}}>Pizza ao Vivo</div>
            </div>
            <div style={{textAlign:'center',background:'#fffbeb',borderRadius:12,padding:'14px 8px',border:`1px solid #fde68a`}}>
              <div style={{fontSize:26,marginBottom:4}}>⚡</div>
              <div style={{fontWeight:900,fontSize:22,color:'#b45309'}}>{expEvts}</div>
              <div style={{fontSize:11,color:C.text2,marginTop:2}}>Pizza Express</div>
            </div>
          </div>
        </div>
      )}

      <div className="card" style={{marginBottom:14}}>
        <div className="section-label" style={{marginBottom:12}}>Receita — Ultimos 3 Meses</div>
        {months.map((m,i)=>(
          <div key={i} style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:12,fontWeight:700}}>{m.lbl}</span>
              <div>
                <span style={{fontSize:12,fontWeight:800,color:C.green}}>{fmtBRL(m.inc)}</span>
                {m.out>0&&<span style={{fontSize:11,color:C.red,marginLeft:8}}>-{fmtBRL(m.out)}</span>}
              </div>
            </div>
            <div style={{height:7,background:'#f0ebe4',borderRadius:4,overflow:'hidden'}}>
              <div style={{height:'100%',background:m.inc>0?C.green:'#e0d5c8',borderRadius:4,width:`${(m.inc/maxMo)*100}%`}}/>
            </div>
          </div>
        ))}
      </div>

      {topProds.length>0&&(
        <div className="card" style={{marginBottom:14}}>
          <div className="section-label" style={{marginBottom:12}}>Top Sabores Mais Pedidos</div>
          {topProds.map(([name,qty],i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<topProds.length-1?`1px solid ${C.border}`:'none'}}>
              <span style={{fontSize:13,fontWeight:600}}>{i+1}. {name}</span>
              <span style={{fontSize:13,fontWeight:800,color:C.red}}>{qty}x pedido(s)</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── PRODUCTS MODAL ─────────────────────────────────────────────────────────
function ProductsModal({ ctx }) {
  const [editing, setEditing] = React.useState(null);
  const grandes = ctx.products.filter(p=>p.cat==='grande');
  const minis   = ctx.products.filter(p=>p.cat==='mini');
  const close   = () => ctx.setShowProds(false);

  const startEdit = p => setEditing({...p});
  const startAdd  = cat => setEditing({id:genId(), name:'', price:'', desc:'', cat, isNew:true});

  const save = () => {
    if(!editing.name||!editing.price) return;
    const p = {id:editing.id, name:editing.name.trim(), price:parseFloat(editing.price)||0, desc:editing.desc||'', cat:editing.cat};
    ctx.setProducts(prev => editing.isNew ? [...prev, p] : prev.map(x=>x.id===p.id?p:x));
    setEditing(null);
  };

  const del = id => {
    if(!window.confirm('Remover este sabor?')) return;
    ctx.setProducts(prev=>prev.filter(x=>x.id!==id));
  };

  const PRow = ({p}) => (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:14}}>{p.name}</div>
        {p.desc&&<div style={{fontSize:11,color:C.text2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.desc}</div>}
      </div>
      <div style={{fontWeight:800,fontSize:14,color:C.green,flexShrink:0}}>{fmtBRL(p.price)}</div>
      <button onClick={()=>startEdit(p)} style={{background:'#eff6ff',border:'none',borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:13,color:C.blue,fontFamily:'inherit',flexShrink:0}}>Edit</button>
      <button onClick={()=>del(p.id)}    style={{background:'#fff5f5',border:'none',borderRadius:8,padding:'6px 9px', cursor:'pointer',color:C.red,fontFamily:'inherit',flexShrink:0}}>Del</button>
    </div>
  );

  return (
    <div className="overlay" onClick={close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:19,fontWeight:800}}>Gerenciar Cardapio</div>
          <button onClick={close} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#bbb'}}>x</button>
        </div>

        {editing ? (
          <div>
            <div style={{background:editing.cat==='grande'?'#fff5f5':'#fffbeb',borderRadius:14,padding:'11px 14px',marginBottom:16,border:`1px solid ${editing.cat==='grande'?'#fca5a5':'#fde68a'}`}}>
              <div style={{fontSize:13,fontWeight:700,color:editing.cat==='grande'?C.red:'#b45309'}}>
                {editing.isNew?'+ Nova':'Editando'} — {editing.cat==='grande'?'Pizza Grande (30cm)':'Mini Pizza'}
              </div>
            </div>
            <label className="label">Nome do Sabor *</label>
            <input className="input" style={{marginBottom:14}} placeholder="Ex: Margherita"
              value={editing.name} onChange={e=>setEditing({...editing,name:e.target.value})} autoFocus/>
            <label className="label">Preco (R$) *</label>
            <input className="input" type="number" inputMode="decimal" style={{marginBottom:14}} placeholder="0,00"
              value={editing.price} onChange={e=>setEditing({...editing,price:e.target.value})}/>
            <label className="label">Descricao (opcional)</label>

              value={editing.desc} onChange={e=>setEditing({...editing,desc:e.target.value})}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <button onClick={()=>setEditing(null)} style={{background:'#f0ebe4',border:'none',borderRadius:14,padding:15,fontWeight:700,cursor:'pointer',color:C.brown,fontFamily:'inherit'}}>
                Cancelar

// ── BACKUP SECTION ────────────────────────────────────────────────────────
function BackupSection({ ctx }) {
  const [importMsg, setImportMsg] = React.useState(null);

  const KEYS = ['fp_trans','fp_orders','fp_events','fp_products','fp_contas','fp_sheet_id','fp_opening_bal','fp_last_sync'];

  const exportBackup = () => {
    const data = {};
    KEYS.forEach(k => { const v = localStorage.getItem(k); if (v) data[k] = JSON.parse(v); });
    data._exportedAt = new Date().toISOString();
    data._version = 1;
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
    a.href = url; a.download = `fino-palastro-backup-${date}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importBackup = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data._version) throw new Error('Arquivo inválido');
        let count = 0;
        const promises = [];
        KEYS.forEach(k => {
          if (data[k] !== undefined) {
            try { localStorage.setItem(k, JSON.stringify(data[k])); } catch {}
            try {
              const p = window.__fsdb.collection('fp_data').doc(k).set({data: data[k], ts: Date.now()});
              promises.push(p);
            } catch {}
            count++;
          }
        });
        setImportMsg({ok:true, msg:`Restaurando ${count} seções e sincronizando com a nuvem...`});
        Promise.all(promises)
          .then(() => {
            setImportMsg({ok:true, msg:`✓ Backup restaurado e sincronizado! Recarregando...`});
            setTimeout(() => window.location.reload(), 1500);
          })
          .catch(() => setTimeout(() => window.location.reload(), 1500));
      } catch(err) {
        setImportMsg({ok:false, msg:'Arquivo inválido ou corrompido. Verifique se é um backup do Fino Palastro.'});
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const forceSyncToCloud = () => {
    setImportMsg({ok:true, msg:'Sincronizando todos os dados com a nuvem...'});
    const promises = KEYS.map(k => {
      const raw = localStorage.getItem(k);
      if (!raw) return Promise.resolve();
      try {
        const v = JSON.parse(raw);
        return window.__fsdb.collection('fp_data').doc(k).set({data: v, ts: Date.now()}).catch(()=>{});
      } catch { return Promise.resolve(); }
    });
    Promise.all(promises).then(() => {
      setImportMsg({ok:true, msg:'✓ Todos os dados foram enviados para a nuvem!'});
      setTimeout(() => setImportMsg(null), 4000);
    }).catch(() => setImportMsg({ok:false, msg:'Erro ao sincronizar. Verifique sua conexão.'}));
  };

  const totalEntries = (ctx.trans?.length||0)+(ctx.orders?.length||0)+(ctx.events?.length||0)+(ctx.contas?.length||0);

  return (
    <div>
      <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>&#128230; Backup dos Dados</div>
      <div style={{fontSize:12,color:C.text2,marginBottom:16,lineHeight:1.6}}>
        Salve todos os dados do sistema em um arquivo JSON.<br/>
        Use para transferir para outro computador ou como segurança.
      </div>
      <div style={{background:'#f0fdf4',borderRadius:12,padding:'10px 14px',marginBottom:14,border:'1px solid #bbf7d0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:C.green,fontWeight:700}}>Total de registros</span>
        <span style={{fontSize:15,fontWeight:900,color:C.green}}>{totalEntries}</span>
      </div>

      <button onClick={exportBackup}
        style={{width:'100%',background:`linear-gradient(135deg,${C.green},#1e5c3a)`,border:'none',borderRadius:14,padding:15,color:'white',fontWeight:800,cursor:'pointer',fontSize:15,fontFamily:'inherit',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        &#11015; Exportar Backup (.json)
      </button>

      <label style={{display:'block',width:'100%',background:'linear-gradient(135deg,#1d4ed8,#1e40af)',borderRadius:14,padding:15,color:'white',fontWeight:800,cursor:'pointer',fontSize:15,textAlign:'center',marginBottom:10}}>
        &#11014; Importar Backup (.json)
        <input type="file" accept=".json" onChange={importBackup} style={{display:'none'}}/>
      </label>

      <button onClick={forceSyncToCloud}
        style={{width:'100%',background:'linear-gradient(135deg,#7c3aed,#5b21b6)',border:'none',borderRadius:14,padding:15,color:'white',fontWeight:800,cursor:'pointer',fontSize:15,fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        &#9729; Forçar Sync com Nuvem
      </button>

      {importMsg && (
        <div style={{marginTop:12,padding:'12px 14px',borderRadius:12,
          background:importMsg.ok?'#f0fdf4':'#fff5f5',
          border:`1px solid ${importMsg.ok?'#bbf7d0':'#fca5a5'}`,
          color:importMsg.ok?C.green:C.red,fontSize:13,fontWeight:700,textAlign:'center'}}>
          {importMsg.msg}
        </div>
      )}
    </div>
  );
}
